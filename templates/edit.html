<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Extracted Data</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            color: white;
        }
        
        .logo {
            font-size: 1.8em;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .back-link {
            background: rgba(255, 255, 255, 0.2);
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
            border: none;
            cursor: pointer;
            font-size: 1em;
        }
        
        .back-link:hover {
            background: rgba(255, 255, 255, 0.3);
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }
        
        .edit-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 40px;
            color: white;
        }
        
        .edit-header h1 {
            font-size: 2.2em;
            margin-bottom: 10px;
        }
        
        .edit-header p {
            opacity: 0.9;
            font-size: 1.05em;
        }
        
        .content {
            padding: 40px;
        }
        
        .section {
            margin-bottom: 40px;
        }
        
        .section-title {
            color: #667eea;
            font-size: 1.5em;
            font-weight: 700;
            margin-bottom: 25px;
            border-left: 5px solid #667eea;
            padding-left: 15px;
        }
        
        /* KEY-VALUE PAIRS EDIT */
        .kv-edit-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 25px;
        }
        
        .kv-edit-item {
            background: #f8f9ff;
            padding: 25px;
            border-radius: 12px;
            border-left: 5px solid #667eea;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group:last-child {
            margin-bottom: 0;
        }
        
        label {
            display: block;
            color: #667eea;
            font-weight: 700;
            font-size: 0.9em;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }
        
        input[type="text"],
        input[type="number"],
        textarea,
        select {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1em;
            font-family: inherit;
            transition: all 0.3s ease;
        }
        
        input[type="text"]:focus,
        input[type="number"]:focus,
        textarea:focus,
        select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        
        textarea {
            resize: vertical;
            min-height: 80px;
        }
        
        /* TABLE EDIT */
        .table-edit-wrapper {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            margin-bottom: 30px;
        }
        
        .table-edit-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px 25px;
            font-weight: 700;
            font-size: 1.1em;
        }
        
        .table-edit-content {
            padding: 25px;
        }
        
        .table-edit-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 25px;
        }
        
        .table-cell-edit {
            background: #f8f9ff;
            padding: 15px;
            border-radius: 8px;
            border: 2px solid #e0e0e0;
        }
        
        .table-cell-label {
            color: #999;
            font-size: 0.8em;
            text-transform: uppercase;
            margin-bottom: 8px;
            font-weight: 600;
        }
        
        .table-cell-input {
            width: 100%;
            padding: 10px;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            font-size: 0.95em;
        }
        
        .table-cell-input:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .add-row-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 700;
            font-size: 1em;
            transition: all 0.3s ease;
            margin-bottom: 20px;
        }
        
        .add-row-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
        }
        
        .row-actions {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }
        
        .delete-btn {
            background: #ff6b6b;
            color: white;
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.9em;
            transition: all 0.3s ease;
        }
        
        .delete-btn:hover {
            background: #ff5252;
            transform: translateY(-2px);
        }
        
        /* BUTTONS */
        .button-group {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 40px;
            padding-top: 30px;
            border-top: 2px solid #eee;
        }
        
        .btn {
            padding: 14px 40px;
            border: none;
            border-radius: 10px;
            font-size: 1.05em;
            cursor: pointer;
            font-weight: 700;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }
        
        .btn-save {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .btn-save:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.4);
        }
        
        .btn-cancel {
            background: #f0f0f0;
            color: #333;
        }
        
        .btn-cancel:hover {
            background: #e0e0e0;
            transform: translateY(-3px);
        }
        
        .success-message {
            background: #d4edda;
            border-left: 5px solid #28a745;
            padding: 20px;
            border-radius: 10px;
            color: #155724;
            margin-bottom: 20px;
            display: none;
        }
        
        .success-message.show {
            display: block;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">
            ✏️ Edit Extracted Data
        </div>
        <button class="back-link" onclick="goBack()">← Back to Results</button>
    </div>
    
    <div class="container">
        <div class="edit-header">
            <h1 id="pageTitle">Edit Data</h1>
            <p id="pageSubtitle">Modify and refine your extracted information</p>
        </div>
        
        <div class="content">
            <div class="success-message" id="successMessage">
                ✅ Changes saved successfully!
            </div>
            
            <!-- KEY-VALUE PAIRS EDIT -->
            <div id="kvEditSection" style="display: none;">
                <div class="section-title">🔑 Key-Value Pairs</div>
                <div class="kv-edit-grid" id="kvEditContainer"></div>
            </div>
            
            <!-- TABLE EDIT -->
            <div id="tableEditSection" style="display: none;">
                <div class="section-title">📊 Tables</div>
                <div id="tableEditContainer"></div>
            </div>
            
            <!-- BUTTONS -->
            <div class="button-group">
                <button class="btn btn-save" onclick="saveChanges()">💾 Save Changes</button>
                <button class="btn btn-cancel" onclick="goBack()">Cancel</button>
            </div>
        </div>
    </div>
    
    <script>
        let editType = 'kv';
        let editData = null;
        let tableIndex = null;
        
        function getQueryParam(name) {
            const url = new URL(window.location);
            return url.searchParams.get(name);
        }
        
        function initEdit() {
            editType = getQueryParam('type') || 'kv';
            const dataStr = getQueryParam('data');
            tableIndex = getQueryParam('index');
            
            if (!dataStr) {
                alert('No data to edit');
                goBack();
                return;
            }
            
            try {
                editData = JSON.parse(decodeURIComponent(dataStr));
            } catch (e) {
                alert('Error parsing data');
                goBack();
                return;
            }
            
            if (editType === 'kv') {
                showKVEdit();
            } else if (editType === 'table') {
                showTableEdit();
            }
        }
        
        function showKVEdit() {
            document.getElementById('pageTitle').textContent = '✏️ Edit Key-Value Pairs';
            document.getElementById('pageSubtitle').textContent = 'Modify the extracted key-value pairs';
            document.getElementById('kvEditSection').style.display = 'block';
            
            const kvPairs = editData.key_value_pairs || {};
            const container = document.getElementById('kvEditContainer');
            container.innerHTML = '';
            
            for (const [key, value] of Object.entries(kvPairs)) {
                const div = document.createElement('div');
                div.className = 'kv-edit-item';
                div.innerHTML = `
                    <div class="form-group">
                        <label>Key</label>
                        <input type="text" value="${escapeHtml(key)}" readonly style="background: #e8e8e8; cursor: not-allowed;">
                    </div>
                    <div class="form-group">
                        <label>Value</label>
                        <textarea data-key="${escapeHtml(key)}">${escapeHtml(String(value))}</textarea>
                    </div>
                `;
                container.appendChild(div);
            }
        }
        
        function showTableEdit() {
            document.getElementById('pageTitle').textContent = '✏️ Edit Tables';
            document.getElementById('pageSubtitle').textContent = 'Modify table data and structure';
            document.getElementById('tableEditSection').style.display = 'block';
            
            const tables = editData.tables || [];
            const container = document.getElementById('tableEditContainer');
            container.innerHTML = '';
            
            tables.forEach((table, idx) => {
                if (tableIndex && tableIndex != idx) return;
                
                const wrapper = document.createElement('div');
                wrapper.className = 'table-edit-wrapper';
                
                let html = `<div class="table-edit-header">${escapeHtml(table.name || `Table ${idx + 1}`)}</div>`;
                html += '<div class="table-edit-content">';
                
                // Headers
                html += '<div style="margin-bottom: 20px;">';
                html += '<label style="display: block; margin-bottom: 10px;">Column Headers</label>';
                html += '<div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 10px;">';
                table.headers.forEach((header, hIdx) => {
                    html += `<input type="text" class="table-header-input" data-table="${idx}" data-index="${hIdx}" value="${escapeHtml(String(header))}" placeholder="Header ${hIdx + 1}">`;
                });
                html += '</div></div>';
                
                // Rows
                html += '<div style="margin-bottom: 20px;">';
                html += '<label style="display: block; margin-bottom: 10px;">Table Rows</label>';
                table.rows.forEach((row, rIdx) => {
                    html += `<div style="background: #f8f9ff; padding: 15px; border-radius: 8px; margin-bottom: 15px;">`;
                    html += `<div style="color: #999; font-size: 0.85em; margin-bottom: 10px; font-weight: 600;">Row ${rIdx + 1}</div>`;
                    html += '<div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 10px; margin-bottom: 10px;">';
                    row.forEach((cell, cIdx) => {
                        html += `<input type="text" class="table-cell-input" data-table="${idx}" data-row="${rIdx}" data-col="${cIdx}" value="${escapeHtml(String(cell))}" placeholder="Cell">`;
                    });
                    html += '</div>';
                    html += `<button class="delete-btn" onclick="deleteTableRow(${idx}, ${rIdx})">🗑️ Delete Row</button>`;
                    html += '</div>';
                });
                html += '</div>';
                
                html += `<button class="add-row-btn" onclick="addTableRow(${idx})">➕ Add Row</button>`;
                html += '</div>';
                
                wrapper.innerHTML = html;
                container.appendChild(wrapper);
            });
        }
        
        function addTableRow(tableIdx) {
            const table = editData.tables[tableIdx];
            if (!table) return;
            
            const newRow = new Array(table.headers.length).fill('');
            table.rows.push(newRow);
            showTableEdit();
        }
        
        function deleteTableRow(tableIdx, rowIdx) {
            if (confirm('Delete this row?')) {
                editData.tables[tableIdx].rows.splice(rowIdx, 1);
                showTableEdit();
            }
        }
        
        function saveChanges() {
            if (editType === 'kv') {
                // Save KV pairs
                const textareas = document.querySelectorAll('textarea[data-key]');
                textareas.forEach(ta => {
                    const key = ta.getAttribute('data-key');
                    editData.key_value_pairs[key] = ta.value;
                });
            } else if (editType === 'table') {
                // Save table data
                document.querySelectorAll('.table-header-input').forEach(input => {
                    const tableIdx = parseInt(input.getAttribute('data-table'));
                    const hIdx = parseInt(input.getAttribute('data-index'));
                    editData.tables[tableIdx].headers[hIdx] = input.value;
                });
                
                document.querySelectorAll('.table-cell-input').forEach(input => {
                    const tableIdx = parseInt(input.getAttribute('data-table'));
                    const rowIdx = parseInt(input.getAttribute('data-row'));
                    const colIdx = parseInt(input.getAttribute('data-col'));
                    editData.tables[tableIdx].rows[rowIdx][colIdx] = input.value;
                });
            }
            
            // Show success message
            const msg = document.getElementById('successMessage');
            msg.classList.add('show');
            
            // Store in session/localStorage
            sessionStorage.setItem('editedData', JSON.stringify(editData));
            
            setTimeout(() => {
                goBack();
            }, 1500);
        }
        
        function goBack() {
            window.history.back();
        }
        
        function escapeHtml(text) {
            const map = {'&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;'};
            return String(text).replace(/[&<>"']/g, m => map[m]);
        }
        
        // Initialize on page load
        window.addEventListener('load', initEdit);
    </script>
</body>
</html>
