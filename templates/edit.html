{% extends "base.html" %}
{% set active_page = 'edit' %}

{% block title %}Edit Data{% endblock %}

{% block head_extra %}
<link rel="stylesheet" href="/static/css/pages/edit.css">
{% endblock %}

{% block content %}
<div class="page-header flex-between">
  <div>
    <h1 class="page-title" id="pageTitle">Edit <span>Data</span></h1>
    <p class="page-subtitle" id="pageSubtitle">Modify and refine your extracted information</p>
  </div>
  <div class="flex gap-3">
    <button class="btn btn-ghost" onclick="goBack()">← Back</button>
    <button class="btn btn-primary" onclick="saveChanges()">💾 Save Changes</button>
  </div>
</div>

<!-- KV Edit Section -->
<div id="kvEditSection" style="display:none; margin-bottom:48px;">
  <div class="section-label">🔑 Key-Value Pairs</div>
  <div class="kv-edit-grid" id="kvEditContainer"></div>
</div>

<!-- Table Edit Section -->
<div id="tableEditSection" style="display:none; margin-bottom:48px;">
  <div class="section-label">📊 Tables</div>
  <div id="tableEditContainer"></div>
</div>

<!-- Action bar -->
<div class="action-bar nexus-emboss" style="padding:24px 32px; border-radius:24px; background:rgba(255,255,255,0.02);">
  <button class="btn btn-ghost" onclick="goBack()">Cancel</button>
  <button class="btn btn-primary" onclick="saveChanges()">💾 Save Changes</button>
</div>
{% endblock %}

{% block scripts %}
<script src="/static/js/pages/edit.js"></script>
{% endblock %}
