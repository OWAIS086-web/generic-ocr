<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OCR Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 900px;
            width: 100%;
            padding: 40px;
        }
        
        h1 {
            color: #333;
            margin-bottom: 10px;
            text-align: center;
            font-size: 2.5em;
        }
        
        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 40px;
            font-size: 1.1em;
        }
        
        .upload-section {
            background: #f8f9fa;
            border: 2px dashed #667eea;
            border-radius: 8px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .upload-section:hover {
            border-color: #764ba2;
            background: #f0f2ff;
        }
        
        .upload-section.dragover {
            border-color: #764ba2;
            background: #e8eaff;
        }
        
        #fileInput {
            display: none;
        }
        
        .upload-icon {
            font-size: 3em;
            margin-bottom: 15px;
        }
        
        .upload-text {
            color: #667eea;
            font-size: 1.2em;
            font-weight: 600;
            margin-bottom: 10px;
        }
        
        .upload-hint {
            color: #999;
            font-size: 0.95em;
        }
        
        .file-name {
            color: #333;
            margin-top: 20px;
            font-weight: 500;
        }
        
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 6px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 20px;
        }
        
        button:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }
        
        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        
        .loading {
            display: none;
            text-align: center;
            margin: 30px 0;
        }
        
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .loading-text {
            color: #667eea;
            font-weight: 600;
        }
        
        .results {
            display: none;
            background: #f8f9fa;
            border-radius: 8px;
            padding: 30px;
            margin-top: 30px;
        }
        
        .results.show {
            display: block;
        }
        
        .results h2 {
            color: #333;
            margin-bottom: 20px;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
        }
        
        .timing-info {
            background: white;
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 20px;
            border-left: 4px solid #667eea;
        }
        
        .timing-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            color: #333;
        }
        
        .timing-row strong {
            color: #667eea;
        }
        
        .raw-text {
            background: white;
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 20px;
            max-height: 300px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 0.95em;
            line-height: 1.6;
            border: 1px solid #e0e0e0;
        }
        
        .key-value-pairs {
            background: white;
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 20px;
        }
        
        .kv-item {
            display: flex;
            padding: 10px 0;
            border-bottom: 1px solid #eee;
        }
        
        .kv-item:last-child {
            border-bottom: none;
        }
        
        .kv-key {
            font-weight: 600;
            color: #667eea;
            min-width: 200px;
        }
        
        .kv-value {
            color: #333;
            flex: 1;
            word-break: break-word;
        }
        
        .error {
            display: none;
            background: #fee;
            border: 1px solid #fcc;
            color: #c33;
            padding: 15px;
            border-radius: 6px;
            margin-top: 20px;
        }
        
        .error.show {
            display: block;
        }
        
        .reset-btn {
            background: #999;
            margin-top: 20px;
        }
        
        .reset-btn:hover {
            background: #777;
        }
        
        @media (max-width: 600px) {
            .container {
                padding: 20px;
            }
            
            h1 {
                font-size: 1.8em;
            }
            
            .kv-item {
                flex-direction: column;
            }
            
            .kv-key {
                min-width: auto;
                margin-bottom: 5px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📄 OCR Dashboard</h1>
        <p class="subtitle">Extract text from images using AI</p>
        
        <div class="upload-section" id="uploadSection">
            <div class="upload-icon">📁</div>
            <div class="upload-text">Click to upload or drag & drop</div>
            <div class="upload-hint">Supported: JPG, PNG, GIF (Max 10MB)</div>
            <input type="file" id="fileInput" accept="image/*">
            <div class="file-name" id="fileName"></div>
            <button id="submitBtn" disabled>Process Image</button>
        </div>
        
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <div class="loading-text">Processing your image...</div>
        </div>
        
        <div class="error" id="error"></div>
        
        <div class="results" id="results">
            <h2>📊 Results</h2>
            
            <div class="timing-info">
                <div class="timing-row">
                    <strong>Preprocessing:</strong>
                    <span id="timingPrep">-</span>
                </div>
                <div class="timing-row">
                    <strong>Text Extraction:</strong>
                    <span id="timingExtract">-</span>
                </div>
                <div class="timing-row">
                    <strong>Structuring:</strong>
                    <span id="timingStruct">-</span>
                </div>
                <div class="timing-row">
                    <strong>Total Time:</strong>
                    <span id="timingTotal" style="color: #667eea; font-weight: bold;">-</span>
                </div>
            </div>
            
            <h3 style="color: #333; margin-top: 25px; margin-bottom: 15px;">🔤 Raw Text</h3>
            <div class="raw-text" id="rawText"></div>
            
            <h3 style="color: #333; margin-top: 25px; margin-bottom: 15px;">🏷️ Key-Value Pairs</h3>
            <div class="key-value-pairs" id="keyValuePairs"></div>
            
            <button class="reset-btn" onclick="resetForm()">Process Another Image</button>
        </div>
    </div>

    <script>
        let selectedFile = null;
        
        const uploadSection = document.getElementById('uploadSection');
        const fileInput = document.getElementById('fileInput');
        const fileName = document.getElementById('fileName');
        const submitBtn = document.getElementById('submitBtn');
        const loading = document.getElementById('loading');
        const error = document.getElementById('error');
        const results = document.getElementById('results');
        
        // Click to upload
        uploadSection.addEventListener('click', () => fileInput.click());
        
        // File selection
        fileInput.addEventListener('change', (e) => {
            selectedFile = e.target.files[0];
            if (selectedFile) {
                fileName.textContent = `Selected: ${selectedFile.name}`;
                submitBtn.disabled = false;
            }
        });
        
        // Drag and drop
        uploadSection.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadSection.classList.add('dragover');
        });
        
        uploadSection.addEventListener('dragleave', () => {
            uploadSection.classList.remove('dragover');
        });
        
        uploadSection.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadSection.classList.remove('dragover');
            
            const files = e.dataTransfer.files;
            if (files.length > 0) {
                fileInput.files = files;
                selectedFile = files[0];
                fileName.textContent = `Selected: ${selectedFile.name}`;
                submitBtn.disabled = false;
            }
        });
        
        // Submit
        submitBtn.addEventListener('click', processImage);
        
        async function processImage() {
            if (!selectedFile) return;
            
            const formData = new FormData();
            formData.append('file', selectedFile);
            
            loading.style.display = 'block';
            error.classList.remove('show');
            results.classList.remove('show');
            
            try {
                const response = await fetch('/process', {
                    method: 'POST',
                    body: formData
                });
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }
                
                const data = await response.json();
                
                if (data.status === 'success') {
                    displayResults(data);
                } else {
                    throw new Error(data.error || 'Processing failed');
                }
            } catch (err) {
                showError(`Error: ${err.message}`);
            } finally {
                loading.style.display = 'none';
            }
        }
        
        function displayResults(data) {
            const timings = data.timings || {};
            
            document.getElementById('timingPrep').textContent = 
                (timings.preprocessing || 0).toFixed(2) + 's';
            document.getElementById('timingExtract').textContent = 
                (timings.structured_extraction || 0).toFixed(2) + 's';
            document.getElementById('timingStruct').textContent = 
                (timings.structuring || 0).toFixed(2) + 's';
            document.getElementById('timingTotal').textContent = 
                (timings.total || 0).toFixed(2) + 's';
            
            document.getElementById('rawText').textContent = 
                data.raw_text || 'No text extracted';
            
            const kvContainer = document.getElementById('keyValuePairs');
            const kvPairs = data.key_value_pairs || {};
            
            if (Object.keys(kvPairs).length > 0) {
                kvContainer.innerHTML = Object.entries(kvPairs)
                    .map(([key, value]) => `
                        <div class="kv-item">
                            <div class="kv-key">${escapeHtml(key)}</div>
                            <div class="kv-value">${escapeHtml(String(value))}</div>
                        </div>
                    `).join('');
            } else {
                kvContainer.innerHTML = '<p style="color: #999;">No key-value pairs found</p>';
            }
            
            results.classList.add('show');
            uploadSection.scrollIntoView({ behavior: 'smooth' });
        }
        
        function showError(message) {
            error.textContent = message;
            error.classList.add('show');
        }
        
        function resetForm() {
            selectedFile = null;
            fileInput.value = '';
            fileName.textContent = '';
            submitBtn.disabled = true;
            results.classList.remove('show');
            error.classList.remove('show');
            uploadSection.scrollIntoView({ behavior: 'smooth' });
        }
        
        function escapeHtml(text) {
            const map = {
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;'
            };
            return text.replace(/[&<>"']/g, m => map[m]);
        }
    </script>
</body>
</html>
